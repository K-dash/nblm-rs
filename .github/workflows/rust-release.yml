name: Release Rust

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nblm-linux-x86_64.tar.gz
            binary: nblm
            use-cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: nblm-linux-aarch64.tar.gz
            binary: nblm
            use-cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: nblm-macos-x86_64.tar.gz
            binary: nblm
            use-cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: nblm-macos-aarch64.tar.gz
            binary: nblm
            use-cross: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross == true
        uses: taiki-e/install-action@7769b73c2ec98c38dfcf2e18c83cfd4880c038c1 # v2.75.27
        with:
          tool: cross

      - name: Build release binary (cross)
        if: matrix.use-cross == true
        run: cross build --release --package nblm-cli --target ${{ matrix.target }}

      - name: Build release binary (native)
        if: matrix.use-cross != true
        run: cargo build --release --package nblm-cli --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          STRIP=strip
          if command -v ${STRIP} >/dev/null 2>&1; then
            ${STRIP} target/${{ matrix.target }}/release/${{ matrix.binary }} || true
          fi
          tar -C target/${{ matrix.target }}/release -czf dist/${{ matrix.artifact }} ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      - name: Generate SHA256 checksum
        run: |
          cd dist
          if command -v sha256sum &> /dev/null; then
            sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          else
            shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          fi

      - name: Upload checksum
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}.sha256
          path: dist/${{ matrix.artifact }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
